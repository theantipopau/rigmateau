name: Deploy Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_DEPLOY_TARGET: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build OpenNext bundle
        env:
          NODE_ENV: production
        run: npm run pages:build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_DEPLOY_TARGET: cloudflare
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Build OpenNext bundle
        env:
          NODE_ENV: production
        run: npm run pages:build

      - name: Deploy with Wrangler
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          NODE_ENV: production
        run: npx wrangler deploy

      - name: Skip deploy when secrets are missing
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Cloudflare deploy skipped because required secrets are not configured."
          echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repository secrets."
