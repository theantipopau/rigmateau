<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <rect width="40" height="40" rx="8" fill="#1c1917"/>
  <!-- NVMe stick shape -->
  <rect x="8" y="16" width="24" height="8" rx="2" fill="#292524" stroke="#78716c" stroke-width="1.2"/>
  <!-- chips on drive -->
  <rect x="10" y="18" width="5" height="4" rx="0.8" fill="#44403c"/>
  <rect x="17" y="18" width="5" height="4" rx="0.8" fill="#44403c"/>
  <rect x="24" y="18" width="3" height="4" rx="0.8" fill="#57534e"/>
  <!-- M.2 connector notch -->
  <rect x="19" y="23" width="2" height="3" rx="0.5" fill="#78716c"/>
  <!-- label line -->
  <rect x="10" y="18.5" width="4" height="0.8" rx="0.3" fill="#a8a29e"/>
  <rect x="10" y="20" width="3" height="0.8" rx="0.3" fill="#78716c"/>
  <!-- indicator LED -->
  <circle cx="30" cy="20" r="1.5" fill="#f97316"/>
  <!-- SATA connector hint at left -->
  <rect x="6" y="17.5" width="3" height="5" rx="0.8" fill="#57534e"/>
</svg>