<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <rect width="40" height="40" rx="8" fill="#1c1a10"/>
  <!-- PSU box -->
  <rect x="7" y="10" width="26" height="22" rx="3" fill="#292410" stroke="#ca8a04" stroke-width="1.2"/>
  <!-- fan grill circle -->
  <circle cx="20" cy="21" r="7" fill="#1c1a10" stroke="#a16207" stroke-width="1"/>
  <circle cx="20" cy="21" r="4" fill="#1c1a10" stroke="#ca8a04" stroke-width="0.8"/>
  <circle cx="20" cy="21" r="1.5" fill="#ca8a04"/>
  <!-- grill spokes -->
  <line x1="20" y1="14" x2="20" y2="28" stroke="#a16207" stroke-width="0.7"/>
  <line x1="13" y1="21" x2="27" y2="21" stroke="#a16207" stroke-width="0.7"/>
  <line x1="15" y1="16" x2="25" y2="26" stroke="#a16207" stroke-width="0.7"/>
  <line x1="25" y1="16" x2="15" y2="26" stroke="#a16207" stroke-width="0.7"/>
  <!-- right side connectors -->
  <rect x="32" y="13" width="3" height="3" rx="0.5" fill="#ca8a04"/>
  <rect x="32" y="18" width="3" height="2" rx="0.5" fill="#ca8a04"/>
  <rect x="32" y="22" width="3" height="2" rx="0.5" fill="#ca8a04"/>
  <!-- 80+ badge -->
  <rect x="9" y="12" width="8" height="4" rx="1" fill="#854d0e"/>
  <text x="13" y="15.5" text-anchor="middle" fill="#fef08a" font-size="3.5" font-family="sans-serif" font-weight="bold">80+</text>
</svg>