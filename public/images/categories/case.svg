<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <rect width="40" height="40" rx="8" fill="#111827"/>
  <!-- case body -->
  <rect x="9" y="7" width="22" height="28" rx="3" fill="#1f2937" stroke="#4b5563" stroke-width="1.2"/>
  <!-- tempered glass panel -->
  <rect x="11" y="9" width="14" height="24" rx="2" fill="#1e3a5f" opacity="0.7" stroke="#3b82f6" stroke-width="0.8"/>
  <!-- visible fans through glass -->
  <circle cx="18" cy="16" r="4.5" fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="2 1"/>
  <circle cx="18" cy="16" r="1.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="18" cy="27" r="4" fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="2 1"/>
  <circle cx="18" cy="27" r="1.2" fill="#3b82f6" opacity="0.5"/>
  <!-- side vents -->
  <rect x="27" y="11" width="2" height="20" rx="1" fill="#374151"/>
  <rect x="29" y="11" width="1.5" height="20" rx="0.5" fill="#374151" opacity="0.5"/>
  <!-- front IO buttons -->
  <circle cx="28" cy="32" r="1.2" fill="#4b5563"/>
  <circle cx="31" cy="32" r="0.8" fill="#374151"/>
</svg>